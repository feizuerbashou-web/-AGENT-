<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>多 Agent 协同运营自动化系统</title>
  <style>
    :root{--bg:#f5f7fb;--surface:#fff;--surface-2:#eef3f8;--text:#1d2733;--muted:#667485;--line:#dbe3ec;--primary:#146c5f;--primary-dark:#0f4f46;--accent:#c95f2c;--blue:#376bba;--green:#258457;--red:#c33d3d;--shadow:0 18px 50px rgba(33,48,70,.08)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app-shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.sidebar{display:flex;flex-direction:column;gap:28px;padding:24px;background:#17212d;color:#fff}.brand{display:flex;align-items:center;gap:12px}.brand-mark{display:grid;width:42px;height:42px;place-items:center;border-radius:8px;background:#2fa084;font-weight:800}.brand span,.eyebrow,.metric span,.panel-head span,.empty-state span{color:var(--muted);font-size:13px}.brand span{display:block;color:#aab7c6;margin-top:3px}.nav{display:grid;gap:8px}.nav-item,.ghost-btn{border:1px solid transparent;border-radius:8px;background:transparent;color:#cfdae7;padding:11px 12px;text-align:left}.nav-item.active,.nav-item:hover,.ghost-btn:hover{background:rgba(255,255,255,.09);color:#fff}.sidebar-footer{display:grid;gap:8px;margin-top:auto}.file-btn input{display:none}.main{min-width:0;padding:28px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:24px}.topbar h1{margin:3px 0 0;font-size:28px}.eyebrow{margin:0;text-transform:uppercase;letter-spacing:.08em}.topbar-actions{display:flex;gap:10px;flex-wrap:wrap}.primary-btn,.secondary-btn{border:0;border-radius:8px;padding:10px 14px;color:#fff;background:var(--primary);box-shadow:0 10px 22px rgba(20,108,95,.18)}.primary-btn:hover{background:var(--primary-dark)}.secondary-btn{background:#2f4054;box-shadow:none}.small{padding:8px 11px;font-size:14px}.view{display:none}.view.active{display:block}.metrics-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px}.metric,.panel,.agent-card,.task-item,.automation-item,.log-item{border:1px solid var(--line);border-radius:8px;background:var(--surface);box-shadow:var(--shadow)}.metric{padding:18px}.metric strong{display:block;margin-top:10px;font-size:30px}.split-layout{display:grid;grid-template-columns:1.4fr .9fr;gap:18px}.panel{padding:18px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.panel-head h2{margin:0;font-size:18px}.pipeline,.agent-grid,.task-list,.automation-list,.log-list{display:grid;gap:12px}.pipeline{grid-template-columns:repeat(3,minmax(0,1fr))}.stage{min-height:260px;border:1px dashed #cad5df;border-radius:8px;padding:12px;background:var(--surface-2)}.stage h3{margin:0 0 10px;font-size:14px;color:#435365}.stage .task-chip{margin-bottom:9px}.task-chip,.tag{display:inline-flex;align-items:center;max-width:100%;border-radius:999px;padding:5px 9px;background:#e1ece8;color:#14564d;font-size:12px}.agent-grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}.agent-card,.task-item,.automation-item,.log-item{padding:14px}.card-row,.task-row,.automation-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.agent-card h3,.task-item h3,.automation-item h3{margin:0 0 8px;font-size:16px}.muted{color:var(--muted);font-size:13px}.status{border-radius:999px;padding:4px 8px;color:#fff;font-size:12px;white-space:nowrap}.status.idle{background:var(--green)}.status.busy{background:var(--blue)}.status.offline{background:#7a8491}.priority-high{color:var(--red)}.priority-mid{color:var(--accent)}.form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}.task-form{grid-template-columns:1.2fr .6fr .6fr 1.3fr auto}.automation-form{grid-template-columns:1fr 1fr 1fr auto}.form-grid input,.form-grid select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;background:#fff}.hidden{display:none}.icon-btn{border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:#fff;color:var(--muted)}.log-item{display:grid;gap:5px;box-shadow:none}.compact .log-item:nth-child(n+6){display:none}.empty-state{display:grid;place-items:center;min-height:150px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);text-align:center}@media(max-width:980px){.app-shell{grid-template-columns:1fr}.sidebar{position:static}.nav,.sidebar-footer,.metrics-grid,.split-layout,.pipeline,.form-grid,.task-form,.automation-form{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">A</div><div><strong>AgentOps</strong><span>协同运营自动化</span></div></div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">总览</button><button class="nav-item" data-view="agents">Agent 团队</button><button class="nav-item" data-view="tasks">任务队列</button><button class="nav-item" data-view="automations">自动化</button><button class="nav-item" data-view="logs">运行日志</button>
      </nav>
      <div class="sidebar-footer"><button id="exportData" class="ghost-btn">导出数据</button><label class="ghost-btn file-btn">导入数据<input id="importData" type="file" accept="application/json" /></label></div>
    </aside>
    <main class="main">
      <header class="topbar"><div><p class="eyebrow">Operations Command Center</p><h1 id="viewTitle">运营总览</h1></div><div class="topbar-actions"><button id="seedDemo" class="secondary-btn">重置演示数据</button><button id="runCycle" class="primary-btn">运行一轮调度</button></div></header>
      <section id="dashboard" class="view active"><div class="metrics-grid"><article class="metric"><span>活跃 Agent</span><strong id="metricAgents">0</strong></article><article class="metric"><span>待处理任务</span><strong id="metricPending">0</strong></article><article class="metric"><span>今日完成</span><strong id="metricDone">0</strong></article><article class="metric"><span>自动化规则</span><strong id="metricAutomations">0</strong></article></div><div class="split-layout"><section class="panel"><div class="panel-head"><h2>协同看板</h2><span id="cycleStatus">等待调度</span></div><div id="pipeline" class="pipeline"></div></section><section class="panel"><div class="panel-head"><h2>近期事件</h2></div><div id="recentLogs" class="log-list compact"></div></section></div></section>
      <section id="agents" class="view"><div class="panel"><div class="panel-head"><h2>Agent 团队</h2><button id="addAgent" class="primary-btn small">新增 Agent</button></div><form id="agentForm" class="form-grid hidden"><input name="name" placeholder="Agent 名称" required /><select name="role" required><option value="策略">策略</option><option value="内容">内容</option><option value="数据">数据</option><option value="客服">客服</option><option value="质检">质检</option></select><input name="skills" placeholder="技能，用逗号分隔" required /><button class="primary-btn">保存</button></form><div id="agentGrid" class="agent-grid"></div></div></section>
      <section id="tasks" class="view"><div class="panel"><div class="panel-head"><h2>任务队列</h2><button id="addTask" class="primary-btn small">新增任务</button></div><form id="taskForm" class="form-grid task-form hidden"><input name="title" placeholder="任务标题" required /><select name="type" required><option value="内容">内容</option><option value="数据">数据</option><option value="客服">客服</option><option value="质检">质检</option><option value="策略">策略</option></select><select name="priority" required><option value="高">高优先级</option><option value="中">中优先级</option><option value="低">低优先级</option></select><input name="description" placeholder="任务描述" required /><button class="primary-btn">保存</button></form><div id="taskList" class="task-list"></div></div></section>
      <section id="automations" class="view"><div class="panel"><div class="panel-head"><h2>自动化规则</h2><button id="addAutomation" class="primary-btn small">新增规则</button></div><form id="automationForm" class="form-grid automation-form hidden"><input name="name" placeholder="规则名称" required /><select name="trigger" required><option value="pendingHigh">出现高优先级待办</option><option value="idleAgent">存在空闲 Agent</option><option value="qualityNeeded">任务等待质检</option></select><select name="action" required><option value="assignBest">分配最匹配 Agent</option><option value="createQualityTask">创建质检任务</option><option value="notifyOps">记录运营提醒</option></select><button class="primary-btn">保存</button></form><div id="automationList" class="automation-list"></div></div></section>
      <section id="logs" class="view"><div class="panel"><div class="panel-head"><h2>运行日志</h2><button id="clearLogs" class="secondary-btn small">清空日志</button></div><div id="logList" class="log-list"></div></div></section>
    </main>
  </div>
  <template id="emptyState"><div class="empty-state"><strong>暂无数据</strong><span>添加一条记录或运行演示数据即可开始。</span></div></template>
  <script>
    const STORAGE_KEY="multi-agent-ops-state-v1";const makeId=()=>crypto.randomUUID();const demoState={agents:[{id:makeId(),name:"策略规划 Agent",role:"策略",skills:["目标拆解","竞品分析","排期"],status:"idle",completed:12},{id:makeId(),name:"内容生产 Agent",role:"内容",skills:["文案","脚本","多平台发布"],status:"idle",completed:26},{id:makeId(),name:"数据洞察 Agent",role:"数据",skills:["报表","归因","异常检测"],status:"idle",completed:18},{id:makeId(),name:"客服响应 Agent",role:"客服",skills:["FAQ","工单","情绪识别"],status:"idle",completed:31},{id:makeId(),name:"质检复核 Agent",role:"质检",skills:["合规","事实检查","风险识别"],status:"idle",completed:16}],tasks:[{id:makeId(),title:"生成本周活动复盘",type:"数据",priority:"高",status:"pending",description:"汇总投放、转化和留存表现",agentId:null,createdAt:Date.now()-4500000},{id:makeId(),title:"编写新品上线推文",type:"内容",priority:"中",status:"pending",description:"适配公众号、小红书和社群",agentId:null,createdAt:Date.now()-2600000},{id:makeId(),title:"处理会员升级咨询",type:"客服",priority:"高",status:"pending",description:"回复高意向用户并标记线索",agentId:null,createdAt:Date.now()-900000},{id:makeId(),title:"检查活动页敏感表述",type:"质检",priority:"中",status:"review",description:"复核广告法风险点",agentId:null,createdAt:Date.now()-800000}],automations:[{id:makeId(),name:"高优先级自动派单",trigger:"pendingHigh",action:"assignBest",enabled:true},{id:makeId(),name:"待质检任务提醒",trigger:"qualityNeeded",action:"notifyOps",enabled:true}],logs:[{id:makeId(),level:"info",message:"系统初始化完成，等待调度。",time:Date.now()-300000}]};let state=loadState();const titles={dashboard:"运营总览",agents:"Agent 团队",tasks:"任务队列",automations:"自动化规则",logs:"运行日志"};const views=document.querySelectorAll(".view"),navItems=document.querySelectorAll(".nav-item"),emptyTemplate=document.querySelector("#emptyState");function loadState(){const saved=localStorage.getItem(STORAGE_KEY);if(!saved)return structuredClone(demoState);try{return JSON.parse(saved)}catch{return structuredClone(demoState)}}function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function addLog(message,level="info"){state.logs.unshift({id:makeId(),level,message,time:Date.now()});state.logs=state.logs.slice(0,120);saveState()}function formatTime(timestamp){return new Intl.DateTimeFormat("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}).format(timestamp)}function getAgent(agentId){return state.agents.find(agent=>agent.id===agentId)}function priorityWeight(priority){return{高:3,中:2,低:1}[priority]||0}function pickBestAgent(task){const candidates=state.agents.filter(agent=>agent.status!=="offline").map(agent=>{const roleScore=agent.role===task.type?4:0,skillScore=agent.skills.some(skill=>task.description.includes(skill)||task.title.includes(skill))?2:0,idleScore=agent.status==="idle"?2:0;return{agent,score:roleScore+skillScore+idleScore-agent.completed*.01}}).sort((a,b)=>b.score-a.score);return candidates[0]?.agent||null}function runCycle(){const enabledRules=state.automations.filter(rule=>rule.enabled);let actions=0;for(const rule of enabledRules){if(rule.trigger==="pendingHigh"&&state.tasks.some(task=>task.status==="pending"&&task.priority==="高"))actions+=executeAction(rule);if(rule.trigger==="idleAgent"&&state.agents.some(agent=>agent.status==="idle"))actions+=executeAction(rule);if(rule.trigger==="qualityNeeded"&&state.tasks.some(task=>task.status==="review"))actions+=executeAction(rule)}const pendingTasks=state.tasks.filter(task=>task.status==="pending").sort((a,b)=>priorityWeight(b.priority)-priorityWeight(a.priority));for(const task of pendingTasks){const agent=pickBestAgent(task);if(!agent)continue;task.agentId=agent.id;task.status="running";agent.status="busy";actions+=1;addLog(`${agent.name} 接收任务：${task.title}`)}const runningTasks=state.tasks.filter(task=>task.status==="running");for(const task of runningTasks.slice(0,Math.max(1,Math.ceil(runningTasks.length/2)))){const agent=getAgent(task.agentId);task.status=task.type==="质检"?"done":"review";if(agent){agent.status="idle";agent.completed+=1}actions+=1;addLog(`${agent?.name||"Agent"} 完成阶段处理：${task.title}`)}document.querySelector("#cycleStatus").textContent=actions>0?`本轮执行 ${actions} 个动作`:"没有可执行动作";saveState();render()}function executeAction(rule){if(rule.action==="assignBest"){const task=state.tasks.find(item=>item.status==="pending"&&(item.priority==="高"||rule.trigger==="idleAgent")),agent=task?pickBestAgent(task):null;if(!task||!agent)return 0;task.agentId=agent.id;task.status="running";agent.status="busy";addLog(`自动化「${rule.name}」将「${task.title}」分配给 ${agent.name}`);return 1}if(rule.action==="createQualityTask"){const source=state.tasks.find(task=>task.status==="review");if(!source)return 0;state.tasks.push({id:makeId(),title:`质检复核：${source.title}`,type:"质检",priority:source.priority,status:"pending",description:`复核任务「${source.title}」输出质量`,agentId:null,createdAt:Date.now()});addLog(`自动化「${rule.name}」创建质检任务`);return 1}if(rule.action==="notifyOps"){addLog(`自动化「${rule.name}」触发运营提醒`,"warn");return 1}return 0}function render(){renderMetrics();renderPipeline();renderAgents();renderTasks();renderAutomations();renderLogs()}function renderMetrics(){document.querySelector("#metricAgents").textContent=state.agents.filter(agent=>agent.status!=="offline").length;document.querySelector("#metricPending").textContent=state.tasks.filter(task=>task.status==="pending").length;document.querySelector("#metricDone").textContent=state.tasks.filter(task=>task.status==="done").length;document.querySelector("#metricAutomations").textContent=state.automations.filter(rule=>rule.enabled).length}function renderPipeline(){const stages=[["pending","待分配"],["running","处理中"],["review","待质检"]],pipeline=document.querySelector("#pipeline");pipeline.innerHTML=stages.map(([status,label])=>{const chips=state.tasks.filter(task=>task.status===status).map(task=>`<div class="task-chip">${escapeHtml(task.title)}</div>`).join("");return`<div class="stage"><h3>${label}</h3>${chips||'<div class="muted">暂无任务</div>'}</div>`}).join("")}function renderAgents(){const container=document.querySelector("#agentGrid");if(!state.agents.length)return setEmpty(container);container.innerHTML=state.agents.map(agent=>`<article class="agent-card"><div class="card-row"><div><h3>${escapeHtml(agent.name)}</h3><div class="muted">${agent.role} · 已完成 ${agent.completed}</div></div><span class="status ${agent.status}">${statusLabel(agent.status)}</span></div><p>${agent.skills.map(skill=>`<span class="tag">${escapeHtml(skill)}</span>`).join(" ")}</p><button class="icon-btn" data-toggle-agent="${agent.id}">切换状态</button> <button class="icon-btn" data-delete-agent="${agent.id}">删除</button></article>`).join("")}function renderTasks(){const container=document.querySelector("#taskList");if(!state.tasks.length)return setEmpty(container);container.innerHTML=state.tasks.slice().sort((a,b)=>priorityWeight(b.priority)-priorityWeight(a.priority)||a.createdAt-b.createdAt).map(task=>{const agent=getAgent(task.agentId),priorityClass=task.priority==="高"?"priority-high":task.priority==="中"?"priority-mid":"";return`<article class="task-item"><div class="task-row"><div><h3>${escapeHtml(task.title)}</h3><div class="muted">${task.type} · <span class="${priorityClass}">${task.priority}优先级</span> · ${taskStatusLabel(task.status)}</div><p>${escapeHtml(task.description)}</p><span class="tag">${agent?escapeHtml(agent.name):"未分配"}</span></div><div><button class="icon-btn" data-advance-task="${task.id}">推进</button> <button class="icon-btn" data-delete-task="${task.id}">删除</button></div></div></article>`}).join("")}function renderAutomations(){const container=document.querySelector("#automationList");if(!state.automations.length)return setEmpty(container);container.innerHTML=state.automations.map(rule=>`<article class="automation-item"><div class="automation-row"><div><h3>${escapeHtml(rule.name)}</h3><div class="muted">${triggerLabel(rule.trigger)} → ${actionLabel(rule.action)}</div></div><div><button class="icon-btn" data-toggle-rule="${rule.id}">${rule.enabled?"停用":"启用"}</button> <button class="icon-btn" data-delete-rule="${rule.id}">删除</button></div></div></article>`).join("")}function renderLogs(){const html=state.logs.map(log=>`<article class="log-item"><strong>${escapeHtml(log.message)}</strong><span class="muted">${formatTime(log.time)} · ${log.level.toUpperCase()}</span></article>`).join("");document.querySelector("#logList").innerHTML=html||emptyMarkup();document.querySelector("#recentLogs").innerHTML=html||emptyMarkup()}function setEmpty(container){container.innerHTML=emptyMarkup()}function emptyMarkup(){return emptyTemplate.innerHTML}function escapeHtml(value){return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function statusLabel(status){return{idle:"空闲",busy:"忙碌",offline:"离线"}[status]||status}function taskStatusLabel(status){return{pending:"待分配",running:"处理中",review:"待质检",done:"已完成"}[status]||status}function triggerLabel(trigger){return{pendingHigh:"出现高优先级待办",idleAgent:"存在空闲 Agent",qualityNeeded:"任务等待质检"}[trigger]}function actionLabel(action){return{assignBest:"分配最匹配 Agent",createQualityTask:"创建质检任务",notifyOps:"记录运营提醒"}[action]}document.addEventListener("click",event=>{const target=event.target,nav=target.closest(".nav-item");if(nav){navItems.forEach(item=>item.classList.toggle("active",item===nav));views.forEach(view=>view.classList.toggle("active",view.id===nav.dataset.view));document.querySelector("#viewTitle").textContent=titles[nav.dataset.view]}if(target.id==="runCycle")runCycle();if(target.id==="seedDemo"){state=structuredClone(demoState);addLog("演示数据已重置。");render()}if(target.id==="addAgent")document.querySelector("#agentForm").classList.toggle("hidden");if(target.id==="addTask")document.querySelector("#taskForm").classList.toggle("hidden");if(target.id==="addAutomation")document.querySelector("#automationForm").classList.toggle("hidden");if(target.id==="clearLogs"){state.logs=[];saveState();render()}const agentId=target.dataset.toggleAgent;if(agentId){const agent=getAgent(agentId);agent.status=agent.status==="idle"?"offline":"idle";addLog(`${agent.name} 状态变更为：${statusLabel(agent.status)}`);render()}const deleteAgentId=target.dataset.deleteAgent;if(deleteAgentId){state.agents=state.agents.filter(agent=>agent.id!==deleteAgentId);state.tasks.forEach(task=>{if(task.agentId===deleteAgentId)task.agentId=null});addLog("已删除一个 Agent。","warn");render()}const taskId=target.dataset.advanceTask;if(taskId){const task=state.tasks.find(item=>item.id===taskId);task.status=task.status==="pending"?"running":task.status==="running"?"review":"done";addLog(`任务「${task.title}」推进到：${taskStatusLabel(task.status)}`);render()}const deleteTaskId=target.dataset.deleteTask;if(deleteTaskId){state.tasks=state.tasks.filter(task=>task.id!==deleteTaskId);addLog("已删除一个任务。","warn");render()}const ruleId=target.dataset.toggleRule;if(ruleId){const rule=state.automations.find(item=>item.id===ruleId);rule.enabled=!rule.enabled;addLog(`自动化「${rule.name}」已${rule.enabled?"启用":"停用"}`);render()}const deleteRuleId=target.dataset.deleteRule;if(deleteRuleId){state.automations=state.automations.filter(rule=>rule.id!==deleteRuleId);addLog("已删除一条自动化规则。","warn");render()}if(target.id==="exportData"){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download=`agentops-data-${Date.now()}.json`;link.click();URL.revokeObjectURL(url)}});document.querySelector("#agentForm").addEventListener("submit",event=>{event.preventDefault();const form=new FormData(event.currentTarget);state.agents.push({id:makeId(),name:form.get("name").trim(),role:form.get("role"),skills:form.get("skills").split(",").map(item=>item.trim()).filter(Boolean),status:"idle",completed:0});event.currentTarget.reset();event.currentTarget.classList.add("hidden");addLog("新增 Agent 成功。");render()});document.querySelector("#taskForm").addEventListener("submit",event=>{event.preventDefault();const form=new FormData(event.currentTarget);state.tasks.push({id:makeId(),title:form.get("title").trim(),type:form.get("type"),priority:form.get("priority"),description:form.get("description").trim(),status:"pending",agentId:null,createdAt:Date.now()});event.currentTarget.reset();event.currentTarget.classList.add("hidden");addLog("新增任务成功。");render()});document.querySelector("#automationForm").addEventListener("submit",event=>{event.preventDefault();const form=new FormData(event.currentTarget);state.automations.push({id:makeId(),name:form.get("name").trim(),trigger:form.get("trigger"),action:form.get("action"),enabled:true});event.currentTarget.reset();event.currentTarget.classList.add("hidden");addLog("新增自动化规则成功。");render()});document.querySelector("#importData").addEventListener("change",async event=>{const file=event.target.files[0];if(!file)return;const text=await file.text();state=JSON.parse(text);addLog("数据导入成功。");render()});render();
  </script>
</body>
</html>
